<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Mini Project</title>
    <!-- Vue.js 3 via CDN for quick protoyping -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f6f9; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .danger { background-color: #dc3545; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div id="app" class="container">
        <h1>HR Management System</h1>
        
        <!-- Login Form -->
        <div v-if="!user">
            <h2>Login</h2>
            <form @submit.prevent="login">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" v-model="loginForm.email" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" v-model="loginForm.password" required>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>

        <!-- Dashboard -->
        <div v-if="user">
            <p>Welcome, {{ user.name }} (Role: {{ user.role }})</p>
            <button @click="logout" class="danger">Logout</button>
            <hr>

            <!-- Employee View (Update phone and address) -->
            <div v-if="user.role === 'EMPLOYEE'">
                <h2>My Profile</h2>
                <div class="form-group">
                    <label>Phone:</label>
                    <input type="text" v-model="user.phone">
                </div>
                <div class="form-group">
                    <label>Address:</label>
                    <input type="text" v-model="user.address">
                </div>
                <button @click="updateMyProfile">Save Updates</button>
            </div>

            <!-- HR View (Manage Employees) -->
            <div v-if="user.role === 'HR'">
                <h2>Employee Management</h2>
                <button @click="showAddForm = !showAddForm">
                    {{ showAddForm ? 'Cancel' : 'Add New Employee' }}
                </button>
                
                <div v-if="showAddForm" style="margin-top: 15px; padding: 15px; border: 1px solid #ccc; border-radius: 4px;">
                    <h3>Add Employee</h3>
                    <div class="form-group">
                        <label>Name:</label>
                        <input type="text" v-model="newEmployee.name" required>
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" v-model="newEmployee.email" required>
                    </div>
                    <div class="form-group">
                        <label>Role:</label>
                        <select v-model="newEmployee.role">
                            <option value="EMPLOYEE">Employee</option>
                            <option value="HR">HR</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Department:</label>
                        <input type="text" v-model="newEmployee.department">
                    </div>
                    <div class="form-group">
                        <label>Password:</label>
                        <input type="password" v-model="newEmployee.password">
                    </div>
                    <button @click="addEmployee">Save Employee</button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Dept</th>
                            <th>Joining Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="emp in employees" :key="emp.id">
                            <td>{{ emp.name }}</td>
                            <td>{{ emp.email }}</td>
                            <td>{{ emp.role }}</td>
                            <td>{{ emp.department }}</td>
                            <td>{{ emp.joiningDate }}</td>
                            <td>
                                <!-- Simplified for display purposes -->
                                <button class="danger" @click="deleteEmployee(emp.id)">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
